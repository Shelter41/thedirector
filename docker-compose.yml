services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: thedirector
      POSTGRES_USER: thedirector
      POSTGRES_PASSWORD: thedirector_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thedirector"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
